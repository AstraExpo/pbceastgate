name: PBC Eastgate CI Workflow

on:
  push:
    branches: ["main", "staging", "dev"]
  pull_request:
    branches: ["main", "staging", "dev"]

jobs:
  build:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo Repo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Lint & Type-Check
        run: pnpm turbo lint check-types

      - name: Production Build Validation
        run: pnpm turbo build

      # NEW STEP: Validate that the local development environments boot up safely
      - name: Validate Development Boot (pnpm dev)
        run: |
          echo "DATABASE_URL=postgresql://eastgate_user:eastgate_secure_password@localhost:5454/eastgate_dev?schema=public" >> $GITHUB_ENV
          pnpm dev &
          PID=$!
          echo "Waiting for development servers to initialize..."
          sleep 15
          if kill -0 $PID 2>/dev/null; then
            echo "SUCCESS: Development processes initialized without immediate crash loops."
            kill $PID
          else
            echo "ERROR: One or more applications failed to boot via 'pnpm dev'."
            exit 1
          fi
