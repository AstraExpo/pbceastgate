packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  "@apollo/protobufjs": true
  "@nestjs/core": true
  "@prisma/engines": true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

peerDependencyRules:
  allowedVersions:
    crossws: "0.4.x"
    "@apollo/server": "5.x"

overrides:
  "@types/graphql-depth-limit>graphql": "^16.0.0"
  "@types/react": "19.2.2"
  "@types/react-dom": "19.2.2"

allowedDeprecatedVersions:
  "@apollo/server-plugin-landing-page-graphql-playground": "*"
  "@babel/plugin-proposal-class-properties": "*"
  "@babel/plugin-proposal-object-rest-spread": "*"
  "@graphql-tools/prisma-loader": "*"
  glob: "*"
  graphql: "*"
  inflight: "*"
  node-domexception: "*"
  subscriptions-transport-ws: "*"
  recharts: "*"
